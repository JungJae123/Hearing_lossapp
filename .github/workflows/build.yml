name: Build EarCare APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Install everything python-for-android needs to compile the app.
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk python3-pip \
            autoconf automake libtool libtool-bin pkg-config \
            zlib1g-dev libncurses-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev build-essential \
            ccache libltdl-dev

      - name: Install Buildozer and Cython
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install "cython==0.29.36"
          pip install buildozer

      - name: Build APK with Buildozer
        run: |
          buildozer android debug

      - name: Upload APK as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: earcare-apk
          path: bin/*.apk
          if-no-files-found: warn

      # Publish to a permanent, phone-friendly download link.
      - name: Publish APK to Releases
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: EarCare (latest build)
          body: |
            Latest EarCare APK.
            On your phone, tap the .apk file below to download and install.
            (You may need to allow "install from unknown sources".)
          files: bin/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
